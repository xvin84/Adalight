name: 🐞 Сообщить об ошибке
description: Что-то работает не так, как ожидалось
labels: [bug]
body:
  - type: textarea
    id: what
    attributes:
      label: Что произошло
      description: Опишите проблему. Если есть — приложите скриншот или лог.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Что ожидалось
    validations:
      required: false
  - type: textarea
    id: steps
    attributes:
      label: Как воспроизвести
      placeholder: |
        1. ...
        2. ...
    validations:
      required: false
  - type: textarea
    id: diagnostics
    attributes:
      label: Диагностика
      description: >
        Кнопка «Сообщить об ошибке» в разделе «Система» подставляет её сама.
        Иначе укажите версию, ОС и активный бэкенд захвата (виден в статус-карточке).
      render: text
    validations:
      required: false
