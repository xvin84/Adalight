name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.12"

      - name: Check that tag matches project version
        shell: bash
        run: |
          version=$(python -c "import tomllib; print(tomllib.load(open('pyproject.toml','rb'))['project']['version'])")
          if [ "v$version" != "$GITHUB_REF_NAME" ]; then
            echo "::error::Тег $GITHUB_REF_NAME не совпадает с версией v$version в pyproject.toml"
            exit 1
          fi

      - name: Install dependencies
        run: uv sync --dev

      - name: Run tests
        run: uv run pytest -q

      - name: Build Adalight.exe (PyInstaller)
        run: >
          uv run pyinstaller --noconfirm --onefile --windowed
          --name Adalight
          --icon assets/icon.ico
          --add-data "assets/icon.png;assets"
          --add-data "CHANGELOG.md;."
          --add-data "CHANGELOG.en.md;."
          --collect-submodules comtypes
          --collect-all soundcard
          --collect-submodules winrt
          main.py

      - name: Build installer (Inno Setup)
        shell: pwsh
        run: |
          $version = python -c "import tomllib; print(tomllib.load(open('pyproject.toml','rb'))['project']['version'])"
          & "${env:ProgramFiles(x86)}\Inno Setup 6\ISCC.exe" /DAppVersion=$version installer.iss

      - name: Smoke check artifacts exist
        shell: bash
        run: test -f dist/Adalight.exe && test -f dist/Adalight-Setup.exe

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-build
          path: |
            dist/Adalight.exe
            dist/Adalight-Setup.exe

  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.12"

      - name: Install system libraries for Qt
        run: sudo apt-get update && sudo apt-get install -y libegl1 libxkbcommon0 libpulse0

      - name: Install dependencies
        run: uv sync --dev

      - name: Run tests
        run: uv run pytest -q

      - name: Build Adalight binary (PyInstaller)
        run: >
          uv run pyinstaller --noconfirm --onefile
          --name Adalight-linux-x86_64
          --add-data "assets/icon.png:assets"
          --add-data "CHANGELOG.md:."
          --add-data "CHANGELOG.en.md:."
          --collect-all soundcard
          main.py

      - name: Smoke check artifact exists
        run: test -f dist/Adalight-linux-x86_64

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: linux-build
          path: dist/Adalight-linux-x86_64

  release:
    needs: [build-windows, build-linux]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Build release notes (what's new + description + features, EN → RU)
        run: python3 scripts/release_notes.py "${GITHUB_REF_NAME#v}" > RELEASE_NOTES.md

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          body_path: RELEASE_NOTES.md
          files: |
            dist/Adalight-Setup.exe
            dist/Adalight.exe
            dist/Adalight-linux-x86_64
