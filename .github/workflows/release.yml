name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.12"

      - name: Check that tag matches project version
        shell: bash
        run: |
          version=$(python -c "import tomllib; print(tomllib.load(open('pyproject.toml','rb'))['project']['version'])")
          if [ "v$version" != "$GITHUB_REF_NAME" ]; then
            echo "::error::Тег $GITHUB_REF_NAME не совпадает с версией v$version в pyproject.toml"
            exit 1
          fi

      - name: Install dependencies
        run: uv sync --dev

      - name: Run tests
        run: uv run pytest -q

      - name: Build Adalight.exe (PyInstaller)
        run: >
          uv run pyinstaller --noconfirm --onefile --windowed
          --name Adalight
          --collect-submodules comtypes
          main.py

      - name: Smoke check artifact exists
        shell: bash
        run: test -f dist/Adalight.exe

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: Adalight-windows
          path: dist/Adalight.exe

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/Adalight.exe
          generate_release_notes: true
