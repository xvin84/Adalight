name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # PySide6 линкуется с libEGL/libGL уже при импорте QtGui — нужны в раннере,
      # иначе тесты, импортирующие GUI (напр. покрытие i18n), падают с ImportError.
      - name: Install system libraries for Qt (PySide6)
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libegl1 libgl1 libxkbcommon0 libdbus-1-3

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: uv sync --dev

      - name: Lint (ruff)
        run: uv run ruff check .

      - name: Tests (pytest)
        env:
          QT_QPA_PLATFORM: offscreen
        run: uv run pytest -q
